<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div ans Span</title>
</head>
<body>
    <!-- content span is for inline and div for block level-->
     <h1><span style="background-color: blueviolet;">this critical information</span></h1>
     <h1><div style="background-color: cornsilk;">this div</div></h1>
     <p><span style="background-color: blueviolet;">this is span sentence</span></p>
     <p><div style="background-color: cornsilk;">this is div</div></p>
</body>
</html>
