    <!-- The display property in CSS controls how an element is rendered in the document layout—it determines how the element takes up space and interacts with surrounding elements.
Core Values
block

Takes up the full width available (stretches horizontally)
Stacks vertically with other elements (each on its own line)
Respects margin, padding, width, and height
Examples: <div>, <p>, <h1>

inline

Only takes up as much width as necessary
Flows horizontally with other content (doesn't create line breaks)
Ignores top/bottom margin and width/height (respects left/right margin and padding)
Examples: <span>, <a>, <strong> -->
    <div>div</div>
    <span>span</span>
